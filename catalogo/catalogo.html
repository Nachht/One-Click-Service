<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo de servicios</title>

    <link rel="stylesheet" href="../estilos-css/catalogo.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="../assets/img/logo.png">

</head>

<body>
    <!-- Botón menú -->
    <div class="menu-btn" id="menuBtn">
        <img src="../assets/img/logo.png" alt="Logo One Click Service">
    </div>

    <!-- Menú lateral -->
    <nav class="menu" id="menu">
        <a href="../inicio/index.html">Inicio</a>
        <a href="../nosotros/nosotros.html">Sobre Nosotros</a>
        <a href="servicios.html">Servicios</a>
        <a href="../preguntas-frecuentes/Preguntas.html">Preguntas Frecuentes</a>
        <a href="../contactenos/contactenos.html">Contáctenos</a>
    </nav>

    <!-- Encabezado del catálogo -->
    <section class="services-container">
        <header class="page-header">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                <div>
                    <h1>
                        Catálogo de Servicios
                    </h1>
                    <p>
                        Encuentra el servicio que necesitas y solicítalo fácilmente.
                    </p>
                </div>

                <div>
                    <span class="badge">
                        <i class="bi bi-info-circle"></i>
                        Total:
                        <span id="totalCount">0</span>
                        servicios
                    </span>
                </div>
            </div>
        </header>

        <!-- Barra de búsqueda -->
        <div class="toolbar">
            <div class="search-box">
                <i class="bi bi-search" aria-hidden="true"></i>
                <input type="text" id="searchInput" class="form-control" placeholder="Buscar servicios...">
            </div>
        </div>

        <!-- Cantidad visible -->
        <div class="results-count">
            Mostrando
            <span id="visibleCount">0</span>
            servicios
        </div>

        <!-- Tarjetas -->
        <div class="row g-4" id="servicesGrid"></div>
    </section>

    <script src="../js/catalogo.js"></script>
    <script src="../js/footer.js"></script>

</body>

</html>
