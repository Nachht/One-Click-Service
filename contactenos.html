<section class="contacto">

<h1>Contáctenos</h1>

<p class="descripcion">
Estamos aquí para ayudarte.
<br>
Escríbenos y te responderemos lo antes posible.
</p>

<div class="contenedor">

<!-- IZQUIERDA -->
<div class="informacion">

<div class="imagen">
<img src="img/contacto.png" alt="Sobre de contacto">
</div>

<div class="datos">
<p>📧 Correo electrónico<br>oneclickservice@gmail.com</p>
<p>☎ Teléfono<br>+57 3001234567</p>
<p>📍 Ubicación<br>Bogotá, Colombia</p>
</div>

</div>

<!-- DERECHA FORMULARIO -->
<div class="formulario">

<form id="formulario">

<label>Nombre</label>
<input type="text" id="nombre" placeholder="Tu Nombre">
<small id="errorNombre"></small>

<label>Correo electrónico</label>
<input type="email" id="correo" placeholder="Tu correo">
<small id="errorCorreo"></small>

<label>Teléfono</label>
<input type="text" id="telefono" placeholder="Tu teléfono">
<small id="errorTelefono"></small>

<label>Mensaje</label>
<textarea id="mensaje" placeholder="Escribe tu mensaje"></textarea>
<small id="errorMensaje"></small>

<button type="submit">Enviar Mensaje</button>

</form>

</div>

</div>

</section>
